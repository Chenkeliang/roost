name: release

# Builds the macOS desktop app and attaches the .dmg to a GitHub Release.
# Triggers ONLY on a version tag (e.g. `v0.1.0`) — pushing code to main does not
# release. `workflow_dispatch` lets you build a .dmg on demand (uploaded as a CI
# artifact, no release). The release is created as a DRAFT, so it is never public
# until you review and publish it. The app is currently unsigned/un-notarized.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    runs-on: macos-latest # Apple Silicon → aarch64 .dmg
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with: { node-version: 24, cache: "pnpm" }
      - uses: dtolnay/rust-toolchain@stable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build:desktop
      - name: Upload .dmg as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: roost-dmg
          path: packages/web/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error
      - name: Draft a GitHub Release with the .dmg (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            packages/web/src-tauri/target/release/bundle/dmg/*.dmg \
            --title "Roost $GITHUB_REF_NAME" \
            --generate-notes \
            --draft
