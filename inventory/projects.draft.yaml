# Roost 草稿项目清单（2026-05-30 盘点，60 个 git 仓库去重整理后）
# 说明：Roost 同步的是“清单”而非代码；apply 时按此清单 clone/pull 到对应路径。
# status 标记：dirty=有未提交改动（迁移前先处理），no_remote=无法靠清单还原（需单独备份）。
# 已剔除工具仓库（由别的机制管理，不纳入）：~/.nvm ~/.oh-my-zsh ~/.codex/.tmp/plugins

migrate_before_sync:   # ⚠️ 迁移前必须先处理这些
  - path: ~/.qclaw/workspace
    status: [no_remote, dirty]   # 风险最高：无 remote 且有改动
  - note: "以下仓库有未提交改动，先 commit/push 或单独备份"
    dirty:
      - ~/.config/yazi
      - ~/.hermes/hermes-agent
      - ~/go/src/gitlab.luojilab.com/atr/atr-marketing
      - ~/go/src/gitlab.luojilab.com/foundation/iap-center
      - ~/go/src/gitlab.luojilab.com/foundation/jccoin
      - ~/go/src/gitlab.luojilab.com/foundation/passgo_portal
      - ~/go/src/gitlab.luojilab.com/igetserver/odob
      - ~/go/src/gitlab.luojilab.com/igetserver/vip_cards_business
      - ~/go/src/gitlab.luojilab.com/rock/iap
      - ~/go/src/gitlab.luojilab.com/shzf/bcp-admin
      - ~/go/src/gitlab.luojilab.com/shzf/bcp-rule
      - ~/go/src/gitlab.luojilab.com/shzf/goblin-metrics
      - ~/go/src/gitlab.luojilab.com/shzf/gosupload

cleanup:   # 🧹 建议清理（不纳入同步）
  - "~/go/src/gitlab.luojilab.com/foundation/warehouse.git — 目录名多 .git 后缀，与 foundation/warehouse 重复"
  - "shzf/bcp-admin — 路径名与 remote(goblin-admin) 不一致，需确认"
  - "rock/go_center_bill 与 ~/Desktop/deskcloud/go_center_bill — 同一 remote 两处克隆"

projects:
  # --- 个人 / 工具项目 ---
  - { path: ~/Projects/zed-skills,            repo: "https://github.com/chenkeliang/zed-skills.git" }
  - { path: ~/clean_my_mac,                   repo: "git@github.com:Chenkeliang/cleanMyMac.git" }
  - { path: ~/env,                            repo: "git@github.com:Chenkeliang/env_profile.git" }
  - { path: ~/Vary,                           repo: "https://github.com/Ucas-HaoranWei/Vary.git" }
  - { path: ~/Desktop/deskcloud/logseq,       repo: "git@github.com:Chenkeliang/logseq.git" }
  - { path: ~/Desktop/deskcloud/go_center_bill, repo: "git@code.qschou.com:qschou/go_center_bill.git" }
  - { path: ~/.hermes/hermes-agent,           repo: "https://github.com/NousResearch/hermes-agent.git", status: [dirty] }

  # --- gitlab.luojilab.com 业务服务（envTool 统一 none：环境靠 Consul/k8s 注入）---
