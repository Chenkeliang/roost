[package]
name = "roost-desktop"
version = "0.2.0"
description = "Roost desktop shell (Tauri v2)"
authors = ["Roost contributors"]
license = "MIT"
repository = "https://github.com/roost-dev/roost"
default-run = "roost-desktop"
edition = "2021"
rust-version = "1.77"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri-plugin-opener = "2.5.4"

[[bin]]
name = "roost-desktop"
path = "src/main.rs"
